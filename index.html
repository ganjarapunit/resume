<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Portfolio</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff; font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Toggle Button */
        .menu-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: #20457c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            display: none; /* Hidden by default on desktop */
        }

        .wrapper { display: flex; width: 100%; height: 100vh; }

        .sidebar {
            width: 280px; min-width: 280px; height: 100%;
            background-color: #fafafa; border-right: 1px solid #eaeaea;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; box-sizing: border-box; text-align: center;
            transition: all 0.3s ease;
        }

        /* Collapsed State for Sidebar */
        .sidebar.collapsed {
            margin-left: -280px;
        }

        .profile-pic {
            width: 100%; max-width: 180px; height: auto;
            border-radius: 50%; margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .contact-info { font-size: 14px; line-height: 1.6; color: #555; }
        .contact-info a { color: #20457c; text-decoration: none; font-weight: bold; }

        .content-area { flex: 1; height: 100%; overflow: hidden; }
        #h5p-container { width: 100%; height: 100% !important; }
        .h5p-iframe-wrapper, iframe { height: 100% !important; width: 100% !important; border: none; }

        /* Responsive adjustments for mobile */
        @media (max-width: 768px) {
            .menu-toggle { display: block; } /* Show button on mobile */
            .sidebar {
                position: fixed;
                z-index: 999;
                margin-left: -280px; /* Hidden by default on mobile */
            }
            .sidebar.active { margin-left: 0; }
            .content-area { width: 100%; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <img src="profile.png" alt="Punit Ganjara" class="profile-pic">
            <p class="contact-info">
                <strong>Punit Ganjara</strong><br>
                ganjarapunit@gmail.com<br>
                +84-822-523-395<br>
                HCMC, Vietnam<br><br>
                <a href="https://linkedin.com/in/ganjarapunit" target="_blank">LinkedIn Profile</a>
            </p>
        </aside>

        <main class="content-area">
            <div id="h5p-container"></div>
        </main>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        // Toggle Function
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            // Toggle 'active' for mobile view and 'collapsed' for desktop if you want
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('active');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        // H5P Initialization
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
