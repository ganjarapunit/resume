<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Resume</title>
    <style>
        /* Removes all default spacing and locks the height to the viewport */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #ffffff; 
            overflow: hidden; /* Prevents double scrollbars */
        }
        
        /* Forces the container to be exactly the height of the screen */
        .h5p-container-wrapper, #h5p-container {
            width: 100%;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Essential: This forces the H5P player's internal components to respect the 100vh height */
        .h5p-iframe-wrapper, iframe {
            height: 100% !important;
        }
    </style>
</head>
<body>

    <div class="h5p-container-wrapper">
        <div id="h5p-container"></div>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
