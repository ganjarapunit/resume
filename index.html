<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Resume</title>
    <style>
    /* 1. Reset everything to fit the screen height perfectly */
    body, html { 
        margin: 0; 
        padding: 0; 
        width: 100%;
        height: 100%;
        background-color: #ffffff; 
        display: flex; /* Use flexbox to manage the child height */
        flex-direction: column;
        overflow: hidden; /* Prevent the body from scrolling */
    }
    
    /* 2. Make the wrapper take up all available space minus a small safety margin */
    .h5p-container-wrapper {
        flex: 1; /* This tells the wrapper to fill all vertical space */
        width: 100%;
        display: flex;
        flex-direction: column;
        margin-bottom: 20px; /* Safety gap so the bottom bar isn't on the very edge */
    }

    /* 3. Force the H5P player to fill the wrapper */
    #h5p-container {
        flex: 1;
        width: 100%;
    }

    /* 4. Force the internal iframe to scale */
    .h5p-iframe-wrapper, iframe {
        height: 100% !important;
        width: 100% !important;
        border: none;
    }
</style>
</head>
<body>

    <div class="h5p-container-wrapper">
        <div id="h5p-container"></div>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
