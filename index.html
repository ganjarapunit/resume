<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Resume</title>
    <style>
        /* Standard full-width layout */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            background-color: #ffffff; 
            font-family: Arial, sans-serif;
        }
        
        .h5p-container-wrapper {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        #h5p-container {
            width: 100%;
            /* Removing the forced height so the H5P player 
               can use its own internal height setting */
        }
    </style>
</head>
<body>

    <div class="h5p-container-wrapper">
        <div id="h5p-container"></div>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
