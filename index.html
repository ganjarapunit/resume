<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Resume</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0 auto; 
            padding: 20px; 
            background-color: #ffffff; 
            max-width: 1100px; /* Widened slightly for the Timeline view */
        }
        
        .h5p-container-wrapper {
            margin-top: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="h5p-container-wrapper">
        <div id="h5p-container"></div>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
