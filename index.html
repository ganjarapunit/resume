<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punit Ganjara | Interactive Portfolio</title>
    <style>
        /* 1. Reset everything for a standard layout */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background-color: #ffffff; 
            font-family: Arial, sans-serif;
            color: #333;
        }
        
        /* 2. Create the Flexbox container for the side-by-side layout */
        .wrapper {
            display: flex;
            width: 100%;
            height: 100vh; /* Locked to the screen height to keep the timeline neat */
            overflow: hidden;
        }

        /* 3. The professional sidebar */
        .sidebar {
            width: 280px; /* Perfect width for a profile */
            min-width: 280px;
            height: 100%;
            background-color: #fafafa; /* Subtle background difference */
            border-right: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Styling the photo */
        .profile-pic {
            width: 100%;
            max-width: 180px; /* Professional size */
            height: auto;
            border-radius: 50%; /* Make it rounder for a softer look */
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .contact-info {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
            margin-top: 10px;
        }

        .contact-info a {
            color: #20457c; /* Use the blue from your original resume */
            text-decoration: none;
            font-weight: bold;
        }

        /* 4. The main content area for the H5P player */
        .content-area {
            flex: 1; /* Fill all remaining space */
            height: 100%;
            overflow: hidden; /* Prevent extra scrolling */
        }

        #h5p-container {
            width: 100%;
            height: 100% !important;
        }

        /* Required internal H5P sizing */
        .h5p-iframe-wrapper, iframe {
            height: 100% !important;
            width: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <img src="profile.png" alt="Punit Ganjara" class="profile-pic">
            <p class="contact-info">
                ganjarapunit@gmail.com<br>
                +84-822-523-395<br>
                HCMC, Vietnam<br>
                <a href="https://linkedin.com/in/ganjarapunit" target="_blank">linkedin.com/in/ganjarapunit</a>
            </p>
        </aside>

        <main class="content-area">
            <div id="h5p-container"></div>
        </main>
    </div>

    <script src="main.bundle.js"></script>
    <script>
        const el = document.getElementById('h5p-container');
        const options = {
            h5pJsonPath: './activity-data', 
            frameJs: './frame.bundle.js',
            frameCss: './styles/h5p.css'
        };
        new H5PStandalone.H5P(el, options);
    </script>
</body>
</html>
